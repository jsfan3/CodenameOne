name: Java snippet validation

on:
  pull_request:
    paths:
      - 'scripts/extract-javadoc-java-snippets.sh'
      - 'scripts/java-snippet-to-playground-uri.sh'
      - '.github/workflows/java-snippet-validation.yml'
  push:
    paths:
      - 'scripts/extract-javadoc-java-snippets.sh'
      - 'scripts/java-snippet-to-playground-uri.sh'
      - '.github/workflows/java-snippet-validation.yml'

jobs:
  validate-snippets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure workflow runs only for script-only changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          mapfile -t changed < <(git diff --name-only "$base" "$head")
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          allowed=(
            "scripts/extract-javadoc-java-snippets.sh"
            "scripts/java-snippet-to-playground-uri.sh"
            ".github/workflows/java-snippet-validation.yml"
          )

          only_allowed=true
          for file in "${changed[@]}"; do
            ok=false
            for allow in "${allowed[@]}"; do
              if [[ "$file" == "$allow" ]]; then
                ok=true
                break
              fi
            done
            if [[ "$ok" == false ]]; then
              only_allowed=false
              break
            fi
          done

          echo "Changed files:"; printf ' - %s\n' "${changed[@]}"
          echo "run=$only_allowed" >> "$GITHUB_OUTPUT"

      - name: Skip because non-script files changed
        if: steps.changes.outputs.run != 'true'
        run: echo "Skipping snippet validation because additional files changed."

      - name: Validate extracted Java snippets
        if: steps.changes.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tmp_jsonl="$(mktemp)"
          scripts/extract-javadoc-java-snippets.sh CodenameOne/src > "$tmp_jsonl"

          python3 - "$tmp_jsonl" <<'PY'
import json
import pathlib
import subprocess
import sys
import tempfile

jsonl_path = pathlib.Path(sys.argv[1])
failures = []
count = 0

for line in jsonl_path.read_text(encoding="utf-8").splitlines():
    if not line.strip():
        continue
    record = json.loads(line)
    count += 1
    with tempfile.NamedTemporaryFile("w", suffix=".java", delete=False, encoding="utf-8") as tmp:
        tmp.write(record.get("code", ""))
        tmp_path = tmp.name
    proc = subprocess.run(
        ["scripts/java-snippet-to-playground-uri.sh", "--file", tmp_path],
        text=True,
        capture_output=True,
        check=False,
    )
    output = (proc.stdout or "").strip()
    if proc.returncode != 0 or not output.startswith("/playground/?code="):
        failures.append(
            {
                "sourceFile": record.get("sourceFile"),
                "symbol": record.get("symbol"),
                "snippetIndex": record.get("snippetIndex"),
                "result": output or (proc.stderr or "").strip(),
            }
        )

if failures:
    print(f"Snippet validation failed for {len(failures)} snippets out of {count}.")
    for failure in failures[:50]:
        print(json.dumps(failure, ensure_ascii=False))
    sys.exit(1)

print(f"Validated {count} snippets successfully.")
PY
